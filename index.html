<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NotCase CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #4b69ff; --purple: #8847ff; --pink: #d32ee6; --red: #eb4b4b; --gold: #caab05; --gray: #333; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #151515; border-bottom: 1px solid #333; }
        .balance { color: #ffca28; font-weight: bold; font-size: 1.1rem; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .page.active { display: block; }

        .case-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #666; cursor: pointer; }

        .roulette-wrapper { position: relative; width: 100%; height: 130px; background: #151515; border: 2px solid #333; overflow: hidden; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ffca28; z-index: 10; transform: translateX(-50%); }
        .cases-line { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); padding-left: 50%; }
        
        .item { min-width: 100px; height: 100px; margin: 5px; background: #222; border-bottom: 4px solid var(--blue); display: flex; align-items: center; justify-content: center; position: relative; }
        .item img { width: 80px; height: auto; object-fit: contain; }
        .item.empty { border-color: var(--gray); }
        .item.blue { border-color: var(--blue); }
        .item.purple { border-color: var(--purple); }
        .item.pink { border-color: var(--pink); }
        .item.red { border-color: var(--red); }
        .item.gold { border-color: var(--gold); }

        .case-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .btn-main { width: 100%; background: #ffca28; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-sec { width: 100%; background: #333; color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        .profile-section { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: calc(100% - 22px); margin: 5px 0; }

        .swap-box { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #151515; border-top: 1px solid #333; display: flex; z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #666; }
        .nav-item.active { color: #ffca28; }
    </style>
</head>
<body>

    <div class="header">
        <div>NotCase 💎</div>
        <div class="balance" id="balanceDisplay">0 NC</div>
    </div>

    <div id="caseModal" class="case-modal">
        <div class="close-modal" onclick="closeCase()">×</div>
        <h2 id="modalTitle" style="text-align:center">Кейс</h2>
        <div class="roulette-wrapper"><div class="pointer"></div><div id="line" class="cases-line"></div></div>
        <button class="btn-main" id="modalSpinBtn">ОТКРЫТЬ КЕЙС</button>
        <p id="modalPrice" style="text-align:center; color:gold; margin-top:10px"></p>
    </div>

    <div id="page-cases" class="page active">
        <div class="case-card" onclick="openCase('poor')"><h3>📦 Бомж-Кейс</h3><div style="color:gold">10 NC</div></div>
        <div class="case-card" onclick="openCase('norm')"><h3>📦 Обычный Кейс</h3><div style="color:gold">5000 NC</div></div>
        <div class="case-card" onclick="openCase('rich')"><h3>👑 Кейс Миллионера</h3><div style="color:gold">2,500,000 NC</div></div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-section">
            <div id="userTitle" style="font-weight: bold; font-size: 1.1rem;">👤 Пользователь</div>
            <div id="userIdDisplay" style="font-size:12px; color:gray">ID: ---</div>
        </div>

        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Промокод</label>
            <input type="text" id="promoInput" placeholder="Введите код">
            <button class="btn-main" onclick="applyPromo()">АКТИВИРОВАТЬ</button>
        </div>

        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Реферальная ссылка</label>
            <input type="text" id="refLink" readonly>
            <button class="btn-sec" onclick="copyRef()">КОПИРОВАТЬ</button>
        </div>

        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Вывод средств</label>
            <div style="margin-top: 10px; color: #eb4b4b; font-weight: bold;">вывод пока что не доступен</div>
        </div>

        <h3>Инвентарь</h3>
        <div id="inventoryGrid" class="inv-grid"></div>
    </div>

    <div id="page-shop" class="page">
        <div class="swap-box">
            <input type="number" id="starsIn" value="10" oninput="calcNC()" style="width:60px"> ➔ <span id="ncOut">1000</span> NC
        </div>
        <button class="btn-main" onclick="topUp()">ПОПОЛНИТЬ ⭐ <span id="starVal">10</span></button>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('cases')">📦<br>Кейсы</div>
        <div class="nav-item" onclick="nav('profile')">👤<br>Профиль</div>
        <div class="nav-item" onclick="nav('shop')">⭐<br>Магазин</div>
    </nav>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('nc_balance')) || 100;
        let inventory = JSON.parse(localStorage.getItem('nc_inv')) || [];
        let usedPromos = JSON.parse(localStorage.getItem('nc_promos')) || [];

        const skins = {
            empty: { name: "Ничего", color: "empty", img: "not.png" },
            deagle: { name: "Deagle | Night", color: "purple", img: "deagle.png" },
            sg: { name: "SG 553", color: "blue", img: "sg.png" },
            ssg: { name: "SSG 08", color: "blue", img: "ssg.png" },
            mp5: { name: "MP5-SD", color: "purple", img: "mp5.png" },
            mac10: { name: "MAC-10", color: "purple", img: "mac10.png" },
            sawed: { name: "Sawed-Off", color: "pink", img: "sawed.png" },
            ak: { name: "AK-47 | Redline", color: "red", img: "ak.png" },
            knife1: { name: "Bowie | Steel", color: "gold", img: "1knife.png" },
            knife2: { name: "Flip | Doppler", color: "gold", img: "2knife.png" },
            knife3: { name: "Gut | Gamma", color: "gold", img: "3knife.png" },
            knife4: { name: "M9 | Bayonet", color: "gold", img: "4knife.png" },
            knife5: { name: "Huntsman | Fade", color: "gold", img: "5knife.png" }
        };

        const config = {
            poor: { title: "Бомж-Кейс", price: 10, pool: [skins.empty], rare: skins.deagle, chance: 0.0001 },
            norm: { title: "Обычный Кейс", price: 5000, pool: [skins.sg, skins.ssg, skins.mp5, skins.mac10, skins.sawed], rare: skins.ak, chance: 0.5 },
            rich: { title: "Кейс Миллионера", price: 2500000, pool: [skins.knife1, skins.knife2, skins.knife3, skins.knife4], rare: skins.knife5, chance: 10 }
        };

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance + " NC";
            localStorage.setItem('nc_balance', balance);
            localStorage.setItem('nc_inv', JSON.stringify(inventory));
            localStorage.setItem('nc_promos', JSON.stringify(usedPromos));
            renderInventory();
        }

        function nav(page) {
            document.querySelectorAll('.page, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openCase(type) {
            let c = config[type];
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalPrice').innerText = "Цена: " + c.price + " NC";
            document.getElementById('modalSpinBtn').onclick = () => startSpin(c.price, type);
            document.getElementById('caseModal').style.display = 'block';
            
            const line = document.getElementById('line');
            line.innerHTML = '';
            for(let i=0; i<10; i++) {
                let s = c.pool[Math.floor(Math.random() * c.pool.length)];
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}"></div>`;
            }
        }

        function closeCase() { document.getElementById('caseModal').style.display = 'none'; }

        function startSpin(price, type) {
            if (balance < price) return tg.showAlert("Мало NC!");
            balance -= price; updateUI();
            
            const line = document.getElementById('line');
            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            line.innerHTML = '';

            let c = config[type];
            let win = c.pool[Math.floor(Math.random() * c.pool.length)];
            if(Math.random() * 100 < c.chance) win = c.rare;

            for(let i=0; i<60; i++) {
                let s = (i === 55) ? win : c.pool[Math.floor(Math.random() * c.pool.length)];
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}"></div>`;
            }

            setTimeout(() => {
                line.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                line.style.transform = `translateX(-${55 * 110 - 20}px)`;
            }, 50);

            setTimeout(() => {
                if (win.name !== "Ничего") { inventory.push(win); tg.showAlert("ВЫПАЛО: " + win.name); }
                else tg.showAlert("Не повезло!");
                updateUI();
            }, 5500);
        }

        async function topUp() {
            let starsCount = parseInt(document.getElementById('starsIn').value);
            tg.showConfirm(`Вы действительно хотите купить ${starsCount * 100} NC за ${starsCount} звёзд?`, async (confirm) => {
                if (confirm) {
                    try {
                        let response = await fetch('https://твой-сервер.com/create-stars-invoice', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: tg.initDataUnsafe.user?.id, stars: starsCount })
                        });
                        let data = await response.json();
                        if (data.invoice_url) {
                            tg.openInvoice(data.invoice_url, (status) => {
                                if (status === 'paid') tg.showAlert("Оплата успешно завершена!");
                            });
                        } else {
                            tg.showAlert("Ошибка: Сервер не вернул ссылку на оплату.");
                        }
                    } catch (e) {
                        tg.showAlert("Бэкенд не подключен. Настройте сервер для приема платежей.");
                    }
                }
            });
        }

        function applyPromo() {
            let code = document.getElementById('promoInput').value.toUpperCase();
            if(["CYGAN", "WELCOME"].includes(code)) {
                if(usedPromos.includes(code)) return tg.showAlert("Уже использован!");
                usedPromos.push(code); balance += 500; updateUI();
                tg.showAlert("Промокод активирован! +500 NC");
            } else tg.showAlert("Неверный код");
        }

        function copyRef() {
            let copyText = document.getElementById("refLink");
            copyText.select();
            document.execCommand("copy");
            tg.showAlert("Ссылка скопирована!");
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = inventory.length ? '' : 'Инвентарь пуст';
            inventory.forEach(i => grid.innerHTML += `<div class="item ${i.color}" style="height:80px;"><img src="${i.img}"></div>`);
        }

        function calcNC() {
            let v = document.getElementById('starsIn').value;
            document.getElementById('ncOut').innerText = v * 100;
            document.getElementById('starVal').innerText = v;
        }

        if(tg.initDataUnsafe.user) {
            document.getElementById('userTitle').innerText = "👤 " + tg.initDataUnsafe.user.first_name;
            document.getElementById('userIdDisplay').innerText = "ID: " + tg.initDataUnsafe.user.id;
            document.getElementById('refLink').value = "https://t.me/notcasecs2_bot?start=" + tg.initDataUnsafe.user.id;
        }

        updateUI();
    </script>
</body>
</html>
