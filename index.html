<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NotCase CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #4b69ff; --purple: #8847ff; --pink: #d32ee6; --red: #eb4b4b; --gold: #caab05; --gray: #333; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #151515; border-bottom: 1px solid #333; }
        .balance { color: #ffca28; font-weight: bold; font-size: 1.1rem; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .page.active { display: block; }

        .case-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #666; cursor: pointer; }

        .roulette-wrapper { position: relative; width: 100%; height: 130px; background: #151515; border: 2px solid #333; overflow: hidden; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ffca28; z-index: 10; transform: translateX(-50%); }
        .cases-line { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); padding-left: 50%; }
        
        .item { min-width: 100px; height: 100px; margin: 5px; background: #222; border-bottom: 4px solid var(--blue); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .item img { width: 60px; height: auto; object-fit: contain; }
        
        /* Цвета редкости */
        .item.empty { border-color: var(--gray); }
        .item.blue { border-color: var(--blue); }
        .item.purple { border-color: var(--purple); }
        .item.pink { border-color: var(--pink); }
        .item.red { border-color: var(--red); }
        .item.gold { border-color: var(--gold); }

        .case-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .btn-main { width: 100%; background: #ffca28; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-withdraw { background: #eb4b4b; color: white; border: none; font-size: 10px; padding: 4px; border-radius: 4px; margin-top: 5px; cursor: pointer; width: 90%; }

        .profile-section { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: calc(100% - 22px); margin: 5px 0; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #151515; border-top: 1px solid #333; display: flex; z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #666; cursor: pointer; }
        .nav-item.active { color: #ffca28; }

        .stars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .star-btn { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div>NotCase 💎</div>
        <div class="balance" id="balanceDisplay">0 NC</div>
    </div>

    <div id="caseModal" class="case-modal">
        <div class="close-modal" onclick="closeCase()">×</div>
        <h2 id="modalTitle" style="text-align:center">Кейс</h2>
        <div class="roulette-wrapper"><div class="pointer"></div><div id="line" class="cases-line"></div></div>
        <button class="btn-main" id="modalSpinBtn">ОТКРЫТЬ КЕЙС</button>
        <p id="modalPrice" style="text-align:center; color:gold; margin-top:10px"></p>
    </div>

    <div id="page-cases" class="page active">
        <div class="case-card" onclick="openCase('poor')"><h3>📦 Бомж-Кейс</h3><div style="color:gold">10 NC</div></div>
        <div class="case-card" onclick="openCase('norm')"><h3>📦 Обычный Кейс</h3><div style="color:gold">5000 NC</div></div>
        <div class="case-card" onclick="openCase('rich')"><h3>👑 Кейс Миллионера</h3><div style="color:gold">2,500,000 NC</div></div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-section">
            <div id="userTitle" style="font-weight: bold; font-size: 1.1rem;">👤 Загрузка...</div>
            <div id="userIdDisplay" style="font-size:12px; color:gray">ID: ---</div>
        </div>
        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Трейд-ссылка (для вывода)</label>
            <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/tradeoffer/...">
            <button class="btn-main" onclick="saveTradeLink()">СОХРАНИТЬ ССЫЛКУ</button>
        </div>
        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Промокод</label>
            <input type="text" id="promoInput" placeholder="WELCOME">
            <button class="btn-main" onclick="applyPromo()">АКТИВИРОВАТЬ</button>
        </div>
        <h3>Инвентарь</h3>
        <div id="inventoryGrid" class="inv-grid"></div>
    </div>

    <div id="page-shop" class="page">
        <div class="stars-grid">
            <button class="star-btn" onclick="setStars(10)">⭐ 10</button>
            <button class="star-btn" onclick="setStars(50)">⭐ 50</button>
            <button class="star-btn" onclick="setStars(100)">⭐ 100</button>
            <button class="star-btn" onclick="setStars(500)">⭐ 500</button>
        </div>
        <div style="text-align:center; margin-bottom:20px;">
            <input type="number" id="starsIn" value="10" oninput="calcNC()" style="width:80px; text-align:center"> ⭐ = <span id="ncOut" style="color:gold; font-weight:bold">1000</span> NC
        </div>
        <button class="btn-main" onclick="topUp()">ПОПОЛНИТЬ ЧЕРЕЗ STARS</button>
    </div>

    <nav class="nav">
        <div id="nav-cases" class="nav-item active" onclick="nav('cases')">📦<br>Кейсы</div>
        <div id="nav-profile" class="nav-item" onclick="nav('profile')">👤<br>Профиль</div>
        <div id="nav-shop" class="nav-item" onclick="nav('shop')">⭐<br>Магазин</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SERVER_URL = 'https://supercrowned-siphonless-shawanna.ngrok-free.dev'; // ПРОВЕРЬ ССЫЛКУ!
        let balance = 0;
        let inventory = JSON.parse(localStorage.getItem('nc_inv')) || [];

        // Скины
        const skins = {
            empty: { name: "Ничего", color: "empty", img: "not.png" },
            ak: { name: "AK-47 | Redline", color: "red", img: "ak.png" },
            knife: { name: "Karambit", color: "gold", img: "4knife.png" },
            deagle: { name: "Deagle", color: "purple", img: "deagle.png" }
        };

        const config = {
            poor: { title: "Бомж-Кейс", price: 10, pool: [skins.empty], rare: skins.deagle, chance: 1 },
            norm: { title: "Обычный Кейс", price: 5000, pool: [skins.deagle], rare: skins.ak, chance: 10 },
            rich: { title: "Кейс Миллионера", price: 2500000, pool: [skins.ak], rare: skins.knife, chance: 20 }
        };

        // --- СИНХРОНИЗАЦИЯ ---
        async function syncWithServer() {
            const user = tg.initDataUnsafe.user;
            if(!user) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/sync-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.id, username: user.username })
                });
                const data = await response.json();
                balance = data.balance;
                document.getElementById('tradeLinkInput').value = data.tradeLink || '';
                updateUI();
            } catch (e) { console.error("Ошибка синхронизации"); }
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " NC";
            renderInventory();
        }

        // --- НАВИГАЦИЯ ---
        function nav(pageId) {
            // Скрываем все страницы
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Убираем активный класс у кнопок
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // Показываем нужную
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        // --- МАГАЗИН ---
        function setStars(val) { document.getElementById('starsIn').value = val; calcNC(); }
        function calcNC() {
            let v = document.getElementById('starsIn').value;
            document.getElementById('ncOut').innerText = (v * 100).toLocaleString();
        }

        async function topUp() {
            let starsCount = parseInt(document.getElementById('starsIn').value);
            let response = await fetch(`${SERVER_URL}/create-invoice`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user?.id, stars: starsCount })
            });
            let data = await response.json();
            if (data.url) tg.openInvoice(data.url, (status) => { if(status === 'paid') syncWithServer(); });
        }

        // --- ПРОФИЛЬ ---
        async function saveTradeLink() {
            const link = document.getElementById('tradeLinkInput').value;
            await fetch(`${SERVER_URL}/save-trade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, tradeLink: link })
            });
            tg.showAlert("Трейд-ссылка сохранена!");
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            inventory.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="item ${item.color}">
                        <img src="${item.img}">
                        <button class="btn-withdraw" onclick="withdrawItem(${index})">ВЫВЕСТИ</button>
                    </div>`;
            });
        }

        async function withdrawItem(index) {
            const item = inventory[index];
            const res = await fetch(`${SERVER_URL}/withdraw-item`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, item: item.name })
            });
            if(res.ok) {
                tg.showAlert("Заявка на " + item.name + " отправлена админу!");
                inventory.splice(index, 1);
                localStorage.setItem('nc_inv', JSON.stringify(inventory));
                renderInventory();
            }
        }

        // --- КЕЙСЫ (ЛОГИКА) ---
        function openCase(type) {
            let c = config[type];
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalPrice').innerText = "Цена: " + c.price + " NC";
            document.getElementById('modalSpinBtn').onclick = () => startSpin(c.price, type);
            document.getElementById('caseModal').style.display = 'block';
            
            const line = document.getElementById('line');
            line.innerHTML = '';
            for(let i=0; i<10; i++) {
                let s = c.pool[Math.floor(Math.random() * c.pool.length)];
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}"></div>`;
            }
        }

        function closeCase() { document.getElementById('caseModal').style.display = 'none'; }

        function startSpin(price, type) {
            if (balance < price) return tg.showAlert("Мало NC!");
            balance -= price; updateUI(); // Снимаем баланс локально для красоты
            
            const line = document.getElementById('line');
            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            line.innerHTML = '';

            let c = config[type];
            let win = (Math.random() * 100 < c.chance) ? c.rare : c.pool[Math.floor(Math.random() * c.pool.length)];

            for(let i=0; i<60; i++) {
                let s = (i === 55) ? win : (c.pool[Math.floor(Math.random() * c.pool.length)]);
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}"></div>`;
            }

            setTimeout(() => {
                line.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                line.style.transform = `translateX(-${55 * 110 - 20}px)`;
            }, 50);

            setTimeout(() => {
                if (win.name !== "Ничего") { 
                    inventory.push(win); 
                    localStorage.setItem('nc_inv', JSON.stringify(inventory));
                    tg.showAlert("ВЫПАЛО: " + win.name); 
                }
                syncWithServer(); // Обновляем баланс с сервера
            }, 5500);
        }

        // Инициализация
        if(tg.initDataUnsafe.user) {
            document.getElementById('userTitle').innerText = "👤 " + tg.initDataUnsafe.user.first_name;
            document.getElementById('userIdDisplay').innerText = "ID: " + tg.initDataUnsafe.user.id;
            syncWithServer();
        }
    </script>
</body>
</html>
