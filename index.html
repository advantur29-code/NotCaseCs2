<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NotCase CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #4b69ff; --purple: #8847ff; --pink: #d32ee6; --red: #eb4b4b; --gold: #caab05; --gray: #333; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #151515; border-bottom: 1px solid #333; }
        .balance { color: #ffca28; font-weight: bold; font-size: 1.1rem; }
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .page.active { display: block; }
        .case-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #666; cursor: pointer; z-index: 110; }
        .roulette-wrapper { position: relative; width: 100%; height: 130px; background: #151515; border: 2px solid #333; overflow: hidden; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ffca28; z-index: 10; transform: translateX(-50%); }
        .cases-line { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); will-change: transform; align-items: center; height: 100%; }
        .item { min-width: 100px; width: 100px; height: 100px; margin: 0 5px; background: #222; border-bottom: 4px solid var(--blue); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
        .item img { width: 60px; height: auto; object-fit: contain; }
        .case-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid #333; cursor: pointer; }
        .btn-main { width: 100%; background: #ffca28; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sell { background: #4caf50; color: white; border: none; font-size: 10px; padding: 4px; border-radius: 4px; margin-top: 5px; cursor: pointer; width: 90%; }
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 10px; }
        .pool-item { background: #1a1a1a; padding: 5px; border-radius: 4px; border-bottom: 2px solid var(--blue); text-align: center; font-size: 9px; }
        .profile-section { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: calc(100% - 22px); margin: 5px 0; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #151515; border-top: 1px solid #333; display: flex; z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #666; cursor: pointer; }
        .nav-item.active { color: #ffca28; }
        .stars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .star-btn { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div>NotCase 📦</div>
        <div class="balance" id="balanceDisplay">0 NC</div>
    </div>

    <div id="caseModal" class="case-modal">
        <div class="close-modal" onclick="closeCase()">✖</div>
        <h2 id="modalTitle" style="text-align:center">Кейс</h2>
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="line" class="cases-line"></div>
        </div>
        <button class="btn-main" id="modalSpinBtn">ОТКРЫТЬ КЕЙС</button>
        <p id="modalPrice" style="text-align:center; color:gold; margin-top:10px"></p>
        <div id="poolGrid" class="pool-grid"></div>
    </div>

    <div id="page-cases" class="page active">
        <div class="case-card" onclick="openCase('poor')"><h3>📦 Бомж-Кейс</h3><div style="color:gold">10 NC</div></div>
        <div class="case-card" onclick="openCase('norm')"><h3>💼 Обычный Кейс</h3><div style="color:gold">15,000 NC</div></div>
        <div class="case-card" onclick="openCase('rich')"><h3>💎 Кейс Миллионера</h3><div style="color:gold">2,500,000 NC</div></div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-section">
            <div id="userTitle" style="font-weight: bold; font-size: 1.1rem;">👤 Загрузка...</div>
            <div id="userIdDisplay" style="font-size:12px; color:gray">ID: ---</div>
        </div>

        <div class="profile-section">
            <button class="btn-main" style="background:#4caf50; color:white; margin-bottom:10px" onclick="claimDaily()">🎁 ЕЖЕДНЕВНЫЙ БОНУС</button>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="star-btn" onclick="doTask('sub_tg', 'https://t.me/TheCaseCs2')">📢 Канал (+50к)</button>
                <button class="star-btn" onclick="doTask('join_chat', 'https://t.me/+3Vp6w6MqO8FkNjEy')">💬 Чат (+25к)</button>
            </div>
        </div>

        <div class="profile-section">
            <label>Твоя реферальная ссылка (3 уровня):</label>
            <input type="text" id="refLink" readonly onclick="this.select()">
        </div>

        <div class="profile-section">
            <input type="text" id="promoInput" placeholder="Промокод...">
            <button class="btn-main" onclick="applyPromo()">АКТИВИРОВАТЬ</button>
        </div>

        <h3>Инвентарь</h3>
        <div id="inventoryGrid" class="inv-grid"></div>
    </div>

    <div id="page-shop" class="page">
        <div class="stars-grid">
            <button class="star-btn" onclick="setStars(10)">⭐ 10</button>
            <button class="star-btn" onclick="setStars(50)">⭐ 50</button>
            <button class="star-btn" onclick="setStars(100)">⭐ 100</button>
            <button class="star-btn" onclick="setStars(500)">⭐ 500</button>
        </div>
        <div style="text-align:center; margin-bottom:20px;">
            <input type="number" id="starsIn" value="10" oninput="calcNC()" style="width:80px; text-align:center"> ⭐ = <span id="ncOut" style="color:gold; font-weight:bold">1000</span> NC
        </div>
        <button class="btn-main" onclick="topUp()">ПОПОЛНИТЬ ЧЕРЕЗ STARS</button>
    </div>

    <nav class="nav">
        <div id="nav-cases" class="nav-item active" onclick="nav('cases')">📦<br>Кейсы</div>
        <div id="nav-profile" class="nav-item" onclick="nav('profile')">👤<br>Профиль</div>
        <div id="nav-shop" class="nav-item" onclick="nav('shop')">💰<br>Магазин</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ОБЯЗАТЕЛЬНО ПРОВЕРЬ ЭТОТ URL
        const SERVER_URL = 'https://advantur.serveousercontent.com';
        
        let balance = 0;
        let inventory = JSON.parse(localStorage.getItem('nc_inv')) || [];

        const skins = {
            empty: { name: "Пусто", color: "empty", img: "not.png", price: 0 },
            shirp1: { name: "Shirp 1", color: "blue", img: "shirp1.png", price: 10 },
            ak: { name: "AK-47 | Redline", color: "red", img: "ak.png", price: 120000 },
            knife: { name: "Knife", color: "gold", img: "4knife.png", price: 2500000 }
        };

        const config = {
            poor: { title: "Бомж-Кейс", price: 10, pool: [skins.shirp1], rare: skins.shirp1 },
            norm: { title: "Обычный Кейс", price: 15000, pool: [skins.shirp1], rare: skins.ak },
            rich: { title: "Кейс Миллионера", price: 2500000, pool: [skins.ak], rare: skins.knife }
        };

        async function syncWithServer() {
            const user = tg.initDataUnsafe.user;
            if(!user) return;
            try {
                const res = await fetch(`${SERVER_URL}/sync-user`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: user.id, username: user.username })
                });
                const data = await res.json();
                balance = data.balance;
                updateUI();
            } catch(e) { console.log("Sync failed"); }
        }

        async function topUp() {
            const stars = document.getElementById('starsIn').value;
            const userId = tg.initDataUnsafe.user?.id;
            try {
                const res = await fetch(`${SERVER_URL}/create-stars-invoice`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: userId, stars: stars })
                });
                const data = await res.json();
                if (data.link) {
                    tg.openInvoice(data.link, (status) => {
                        if (status === 'paid') {
                            tg.showAlert("Оплата принята!");
                            setTimeout(syncWithServer, 2000);
                        }
                    });
                }
            } catch(e) { tg.showAlert("Ошибка платежа"); }
        }

        async function claimDaily() {
            const res = await fetch(`${SERVER_URL}/daily-bonus`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id })
            });
            const data = await res.json();
            if(data.ok) { balance = data.newBalance; updateUI(); tg.showAlert("🎁 +500 NC!"); }
            else { tg.showAlert(data.error); }
        }

        async function applyPromo() {
            const code = document.getElementById('promoInput').value;
            const res = await fetch(`${SERVER_URL}/apply-promo`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, promo: code })
            });
            const data = await res.json();
            if(data.ok) { balance = data.newBalance; updateUI(); tg.showAlert("Миллион NC зачислен!"); }
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " NC";
            renderInventory();
        }

        function nav(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        function setStars(val) { document.getElementById('starsIn').value = val; calcNC(); }
        function calcNC() { document.getElementById('ncOut').innerText = (document.getElementById('starsIn').value * 100).toLocaleString(); }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            inventory.forEach((item, index) => {
                grid.innerHTML += `<div class="item ${item.color}"><img src="${item.img}"><button class="btn-sell" onclick="sellItem(${index})">ПРОДАТЬ</button></div>`;
            });
        }

        function sellItem(index) {
            balance += inventory[index].price;
            inventory.splice(index, 1);
            localStorage.setItem('nc_inv', JSON.stringify(inventory));
            updateUI();
            fetch(`${SERVER_URL}/update-balance`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, balance: balance })
            });
        }

        function openCase(type) {
            let c = config[type];
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalPrice').innerText = "Цена: " + c.price.toLocaleString() + " NC";
            document.getElementById('modalSpinBtn').onclick = () => startSpin(c.price, type);
            document.getElementById('caseModal').style.display = 'block';
            
            const line = document.getElementById('line');
            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            line.innerHTML = '';
            for(let i=0; i<20; i++) {
                line.innerHTML += `<div class="item ${c.pool[0].color}"><img src="${c.pool[0].img}"></div>`;
            }
        }

        function closeCase() { document.getElementById('caseModal').style.display = 'none'; }

        function startSpin(price, type) {
            if (balance < price) return tg.showAlert("Недостаточно NC!");
            const btn = document.getElementById('modalSpinBtn');
            btn.disabled = true;
            balance -= price;
            updateUI();

            const line = document.getElementById('line');
            const win = config[type].rare;
            const winIndex = 45;
            line.innerHTML = '';
            for(let i=0; i<50; i++) {
                let s = (i === winIndex) ? win : config[type].pool[0];
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}"></div>`;
            }

            setTimeout(() => {
                line.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                const itemWidth = 110;
                const offset = (winIndex * itemWidth) - (window.innerWidth / 2) + 55;
                line.style.transform = `translateX(-${offset}px)`;
            }, 50);

            setTimeout(() => {
                inventory.push(win);
                localStorage.setItem('nc_inv', JSON.stringify(inventory));
                tg.showAlert("Поздравляем! Вы выбили: " + win.name);
                btn.disabled = false;
                updateUI();
            }, 5500);
        }

        if(tg.initDataUnsafe.user) {
            const u = tg.initDataUnsafe.user;
            document.getElementById('userTitle').innerText = "👤 " + (u.username || u.first_name);
            document.getElementById('userIdDisplay').innerText = "ID: " + u.id;
            document.getElementById('refLink').value = "https://t.me/notcasecs2_bot?start=" + u.id;
            syncWithServer();
        }
    </script>
</body>
</html>
