<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NotCase CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #4b69ff; --purple: #8847ff; --pink: #d32ee6; --red: #eb4b4b; --gold: #caab05; --gray: #333; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #151515; border-bottom: 1px solid #333; }
        .balance { color: #ffca28; font-weight: bold; font-size: 1.1rem; }
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .page.active { display: block; }
        .case-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #666; cursor: pointer; z-index: 110; }
        .roulette-wrapper { position: relative; width: 100%; height: 130px; background: #151515; border: 2px solid #333; overflow: hidden; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ffca28; z-index: 10; transform: translateX(-50%); }
        .cases-line { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); will-change: transform; align-items: center; height: 100%; }
        .item { min-width: 100px; width: 100px; height: 100px; margin: 0 5px; background: #222; border-bottom: 4px solid var(--blue); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
        .item img { width: 60px; height: auto; object-fit: contain; }
        .item.empty { border-color: var(--gray); }
        .item.blue { border-color: var(--blue); }
        .item.purple { border-color: var(--purple); }
        .item.pink { border-color: var(--pink); }
        .item.red { border-color: var(--red); }
        .item.gold { border-color: var(--gold); }
        .case-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .btn-main { width: 100%; background: #ffca28; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-withdraw, .btn-sell { color: white; border: none; font-size: 10px; padding: 4px; border-radius: 4px; margin-top: 5px; cursor: pointer; width: 90%; }
        .btn-withdraw { background: #eb4b4b; }
        .btn-sell { background: #4caf50; }
        .pool-preview { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 10px; }
        .pool-item { background: #1a1a1a; padding: 5px; border-radius: 4px; border-bottom: 2px solid var(--blue); text-align: center; font-size: 9px; }
        .pool-item img { width: 40px; }
        .profile-section { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: calc(100% - 22px); margin: 5px 0; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #151515; border-top: 1px solid #333; display: flex; z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #666; cursor: pointer; }
        .nav-item.active { color: #ffca28; }
        .stars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .star-btn { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div>NotCase 💎</div>
        <div class="balance" id="balanceDisplay">0 NC</div>
    </div>

    <div id="caseModal" class="case-modal">
        <div class="close-modal" onclick="closeCase()">×</div>
        <h2 id="modalTitle" style="text-align:center">Кейс</h2>
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="line" class="cases-line"></div>
        </div>
        <button class="btn-main" id="modalSpinBtn">ОТКРЫТЬ КЕЙС</button>
        <p id="modalPrice" style="text-align:center; color:gold; margin-top:10px"></p>
        
        <div class="pool-preview">
            <div style="font-size: 14px; color: #aaa; margin-bottom: 10px;">Содержимое кейса:</div>
            <div id="poolGrid" class="pool-grid"></div>
        </div>
    </div>

    <div id="page-cases" class="page active">
        <div class="case-card" onclick="openCase('poor')"><h3>📦 Бомж-Кейс</h3><div style="color:gold">10 NC</div></div>
        <div class="case-card" onclick="openCase('norm')"><h3>📦 Обычный Кейс</h3><div style="color:gold">15,000 NC</div></div>
        <div class="case-card" onclick="openCase('rich')"><h3>👑 Кейс Миллионера</h3><div style="color:gold">2,500,000 NC</div></div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-section">
            <div id="userTitle" style="font-weight: bold; font-size: 1.1rem;">👤 Загрузка...</div>
            <div id="userIdDisplay" style="font-size:12px; color:gray">ID: ---</div>
        </div>

        <div class="profile-section">
             <label style="font-size: 13px; color: #aaa;">Бонусы</label>
             <button class="btn-main" style="background:#4caf50; color:white; margin-bottom:10px" onclick="claimDaily()">🎁 ЗАБРАТЬ 500 NC</button>
             <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="star-btn" onclick="doTask('sub_tg', 'https://t.me/TheCaseCs2')">📢 Канал</button>
                <button class="star-btn" onclick="doTask('join_chat', 'https://t.me/+3Vp6w6MqO8FkNjEy')">💬 Чат</button>
             </div>
        </div>
        <div class="profile-section">
    <label style="font-size: 13px; color: #aaa;">Бонусы за поддержку</label>
    <button class="btn-main" style="background:#4caf50; color:white; margin-bottom:10px" onclick="claimDaily()">🎁 ЕЖЕДНЕВНЫЙ БОНУС</button>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
        <button class="star-btn" onclick="doTask('sub_tg', 'https://t.me/TheCaseCs2')">📢 Канал (+50к)</button>
        <button class="star-btn" onclick="doTask('join_chat', 'https://t.me/+3Vp6w6MqO8FkNjEy')">💬 Чат (+25к)</button>
    </div>
    
    <button class="btn-main" style="background: linear-gradient(to right, #8847ff, #d32ee6); color: white;" 
            onclick="doTask('boost_tg', 'https://t.me/boost/TheCaseCs2')">
        🚀 ПРОГОЛОСОВАТЬ ЗА КАНАЛ (+500к NC)
    </button>
    </div>
        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Промокод</label>
            <input type="text" id="promoInput" placeholder="Введите промокод...">
            <button class="btn-main" onclick="applyPromo()">АКТИВИРОВАТЬ</button>
        </div>
        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Трейд-ссылка (для вывода)</label>
            <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/tradeoffer/...">
            <button class="btn-main" onclick="saveTradeLink()">СОХРАНИТЬ ССЫЛКУ</button>
        </div>
        <div class="profile-section">
            <label style="font-size: 13px; color: #aaa;">Твоя реферальная ссылка</label>
            <input type="text" id="refLink" readonly onclick="this.select()">
            <p style="font-size: 10px; color: #777;">+500 NC за каждого друга</p>
        </div>
        <h3>Инвентарь</h3>
        <div id="inventoryGrid" class="inv-grid"></div>
    </div>

    <div id="page-shop" class="page">
        <div class="stars-grid">
            <button class="star-btn" onclick="setStars(10)">⭐ 10</button>
            <button class="star-btn" onclick="setStars(50)">⭐ 50</button>
            <button class="star-btn" onclick="setStars(100)">⭐ 100</button>
            <button class="star-btn" onclick="setStars(500)">⭐ 500</button>
        </div>
        <div style="text-align:center; margin-bottom:20px;">
            <input type="number" id="starsIn" value="10" oninput="calcNC()" style="width:80px; text-align:center"> ⭐ = <span id="ncOut" style="color:gold; font-weight:bold">1000</span> NC
        </div>
        <button class="btn-main" onclick="topUp()">ПОПОЛНИТЬ ЧЕРЕЗ STARS</button>
    </div>

    <nav class="nav">
        <div id="nav-cases" class="nav-item active" onclick="nav('cases')">📦<br>Кейсы</div>
        <div id="nav-profile" class="nav-item" onclick="nav('profile')">👤<br>Профиль</div>
        <div id="nav-shop" class="nav-item" onclick="nav('shop')">⭐<br>Магазин</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SERVER_URL = 'https://notcasecs2.onrender.com'; 
        let balance = 0;
        let inventory = JSON.parse(localStorage.getItem('nc_inv')) || [];

        const skins = {
            empty: { name: "Ничего", color: "empty", img: "not.png", price: 0 },
            shirp1: { name: "Shirp 1", color: "blue", img: "shirp1.png", price: 10 },
            shirp2: { name: "Shirp 2", color: "blue", img: "shirp2.png", price: 15 },
            shirp3: { name: "Shirp 3", color: "blue", img: "shirp3.png", price: 20 },
            shirp4: { name: "Shirp 4", color: "blue", img: "shirp4.png", price: 25 },
            shirp5: { name: "Shirp 5", color: "blue", img: "shirp5.png", price: 30 },
            deagle: { name: "Desert Eagle | Printstream", color: "purple", img: "deagle.png", price: 45000 },
            ak: { name: "AK-47 | Redline", color: "red", img: "ak.png", price: 120000 },
            m4: { name: "M4A4 | Howl", color: "red", img: "voi.png", price: 850000 },
            knife: { name: "knife", color: "gold", img: "4knife.png", price: 2500000 }
        };

        const config = {
            poor: { title: "Бомж-Кейс", price: 10, pool: [skins.shirp1], rare: skins.knife, chance: 0 }, 
            norm: { title: "Обычный Кейс", price: 15000, pool: [skins.shirp1, skins.shirp2, skins.shirp3, skins.shirp4, skins.shirp5], rare: skins.ak, chance: 0 },
            rich: { title: "Кейс Миллионера", price: 2500000, pool: [skins.ak, skins.m4, skins.deagle], rare: skins.knife, chance: 10 }
        };

        async function syncWithServer() {
            const user = tg.initDataUnsafe.user;
            if(!user) return;
            const res = await fetch(`${SERVER_URL}/sync-user`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: user.id, username: user.username })
            });
            const data = await res.json();
            balance = data.balance;
            updateUI();
        }

        async function doTask(taskId, link) {
            window.open(link, '_blank');
            setTimeout(async () => {
                const res = await fetch(`${SERVER_URL}/check-task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, taskId: taskId })
                });
                const data = await res.json();
                if (data.ok) { tg.showAlert("Награда получена!"); balance = data.newBalance; updateUI(); }
                else { tg.showAlert(data.error); }
            }, 5000);
        }

        async function claimDaily() {
            const res = await fetch(`${SERVER_URL}/daily-bonus`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id })
            });
            const data = await res.json();
            if(data.ok) { tg.showAlert("🎁 +500 NC!"); balance = data.newBalance; updateUI(); }
            else { tg.showAlert(data.error); }
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " NC";
            renderInventory();
        }

        function nav(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        function setStars(val) { document.getElementById('starsIn').value = val; calcNC(); }
        function calcNC() {
            let v = document.getElementById('starsIn').value;
            document.getElementById('ncOut').innerText = (v * 100).toLocaleString();
        }

        async function applyPromo() {
            const code = document.getElementById('promoInput').value;
            if(!code) return;
            const res = await fetch(`${SERVER_URL}/apply-promo`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, promo: code })
            });
            const data = await res.json();
            if(res.ok) { tg.showAlert("Успешно!"); balance = data.newBalance; updateUI(); }
            else { tg.showAlert(data.error); }
        }

        async function saveTradeLink() {
            const link = document.getElementById('tradeLinkInput').value;
            await fetch(`${SERVER_URL}/save-trade`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, tradeLink: link })
            });
            tg.showAlert("Сохранено!");
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            inventory.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="item ${item.color}">
                        <img src="${item.img}" onerror="this.src='not.png'">
                        <div style="font-size:9px; margin-top:2px;">${item.price} NC</div>
                        <button class="btn-sell" onclick="sellItem(${index})">ПРОДАТЬ</button>
                        <button class="btn-withdraw" onclick="withdrawItem(${index})">ВЫВЕСТИ</button>
                    </div>`;
            });
        }

        function sellItem(index) {
            balance += inventory[index].price;
            inventory.splice(index, 1);
            localStorage.setItem('nc_inv', JSON.stringify(inventory));
            updateUI();
            fastSaveBalance();
        }

        async function withdrawItem(index) {
            const item = inventory[index];
            const res = await fetch(`${SERVER_URL}/withdraw-item`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, item: item.name })
            });
            if(res.ok) {
                tg.showAlert("Заявка отправлена!");
                inventory.splice(index, 1);
                localStorage.setItem('nc_inv', JSON.stringify(inventory));
                renderInventory();
            }
        }

        function openCase(type) {
            let c = config[type];
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalPrice').innerText = "Цена: " + c.price.toLocaleString() + " NC";
            document.getElementById('modalSpinBtn').onclick = () => startSpin(c.price, type);
            
            const pGrid = document.getElementById('poolGrid');
            pGrid.innerHTML = '';
            const fullPool = [...c.pool, c.rare];
            fullPool.forEach(s => {
                pGrid.innerHTML += `<div class="pool-item ${s.color}"><img src="${s.img}" onerror="this.src='not.png'"><br>${s.name}</div>`;
            });

            document.getElementById('caseModal').style.display = 'block';
            const line = document.getElementById('line');
            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            line.innerHTML = '';
            
            for(let i=0; i<15; i++) {
                let s = fullPool[Math.floor(Math.random() * fullPool.length)];
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}" onerror="this.src='not.png'"></div>`;
            }
        }

        function closeCase() { document.getElementById('caseModal').style.display = 'none'; }

        function startSpin(price, type) {
            if (balance < price) return tg.showAlert("Мало NC!");
            const btn = document.getElementById('modalSpinBtn');
            if(btn.disabled) return;
            btn.disabled = true;
            balance -= price; 
            updateUI();
            fastSaveBalance();

            const line = document.getElementById('line');
            line.innerHTML = '';
            let c = config[type];
            let roll = Math.random() * 100;
            let win = (type === 'rich' && roll <= c.chance) ? c.rare : (type === 'rich' ? c.pool[Math.floor(Math.random() * c.pool.length)] : skins.empty);

            const totalItems = 60;
            const winIndex = 55;
            let spinPool = [...c.pool, c.rare, skins.empty];

            for(let i=0; i<totalItems; i++) {
                let s = (i === winIndex) ? win : spinPool[Math.floor(Math.random() * spinPool.length)];
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}" onerror="this.src='not.png'"></div>`;
            }

            setTimeout(() => {
                line.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                const finalPosition = (winIndex * 110) + 55 - (document.querySelector('.roulette-wrapper').offsetWidth / 2);
                line.style.transform = `translateX(-${finalPosition}px)`;
            }, 50);

            setTimeout(() => {
                if (win.name !== "Ничего") { 
                    inventory.push(win); 
                    localStorage.setItem('nc_inv', JSON.stringify(inventory));
                    tg.showAlert("ВЫПАЛО: " + win.name); 
                } else tg.showAlert("Пусто!");
                btn.disabled = false;
                updateUI();
            }, 5500);
        }

        function fastSaveBalance() {
            fetch(`${SERVER_URL}/update-balance`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, balance: balance })
            });
        }

        function init() {
            if(tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                document.getElementById('userTitle').innerText = "👤 " + (user.first_name || "User");
                document.getElementById('userIdDisplay').innerText = "ID: " + user.id;
                document.getElementById('refLink').value = "https://t.me/notcasecs2_bot?start=" + user.id;
                syncWithServer();
            }
            updateUI();
        }
        init();
    </script>
</body>
</html>
